# GlobeCloud AP South regional backend
app = "globecloud-ap"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  PRODUCT_NAME = "GlobeCloud"
  DEPLOYMENT_MODE = "regional"
  REGION_ID = "ap-south-1"
  DATA_DIR = "/data"
  HOST = "0.0.0.0"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "globe_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/api/v1/health"
    timeout = "5s"
