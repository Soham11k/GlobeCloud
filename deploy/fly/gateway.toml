# GlobeCloud Global Gateway — primary public URL
app = "globecloud"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PRODUCT_NAME = "GlobeCloud"
  DEPLOYMENT_MODE = "gateway"
  HOST = "0.0.0.0"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/api/v1/health"
    timeout = "5s"
