name: Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config deploy/fly/gateway.toml -a globecloud-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
