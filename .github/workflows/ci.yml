name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: globe
          POSTGRES_PASSWORD: globe
          POSTGRES_DB: globe_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e . -r requirements.txt
      - run: ruff check src/globe tests
      - run: pytest tests/unit --cov=src/globe --cov-fail-under=20 -q
        env:
          DATABASE_URL: postgresql+psycopg://globe:globe@localhost:5432/globe_platform
          REGIONAL_DATABASE_URL: postgresql+psycopg://globe:globe@localhost:5432/globe_platform
          ENVIRONMENT: development

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
