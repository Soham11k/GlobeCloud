services:
  globecloud:
    build: .
    ports:
      - "8000:8000"
    environment:
      PRODUCT_NAME: GlobeCloud
      DATA_DIR: /data
      # Uncomment for production auth:
      # API_KEY: change-me-in-production
      # OPENAI_API_KEY: sk-...
    volumes:
      - globecloud_data:/data
    restart: unless-stopped

volumes:
  globecloud_data:
